version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: htc_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: htc_community
    ports:
      - '5432:5432'
    volumes:
      - htc_pgdata:/var/lib/postgresql/data

volumes:
  htc_pgdata:
